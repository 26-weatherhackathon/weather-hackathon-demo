<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>우리 마을 홍수 방재 — 골든타임 프로토타입</title>
<style>
  :root{--safe:#43A047;--warn:#FB8C00;--danger:#E53935;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:linear-gradient(#dff2ff,#f5fbff);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:20px;}
  .card{position:relative;width:960px;height:660px;border-radius:32px;
    background:linear-gradient(#eaf7ff,#cfeafc);overflow:hidden;text-align:center;
    box-shadow:0 24px 70px rgba(60,120,180,.3);}
  .hud{position:absolute;top:0;left:0;right:0;z-index:8;padding:18px 26px;
    display:flex;align-items:center;gap:10px;}
  .badge{font-weight:800;font-size:18px;color:#fff;padding:9px 20px;border-radius:999px;
    background:var(--safe);transition:background .3s;}
  .rain-amt{margin-left:auto;font-weight:800;color:#2b6fb0;font-size:17px;}
  .speech{position:absolute;left:50%;top:60px;transform:translateX(-50%);z-index:8;
    background:#fff;color:#2b4a63;font-weight:700;font-size:17px;padding:11px 22px;
    border-radius:20px;box-shadow:0 6px 16px rgba(40,90,140,.2);white-space:nowrap;max-width:92%;}
  #lottieSpark{position:absolute;left:50%;top:100px;width:440px;height:440px;
    transform:translateX(-50%);z-index:7;pointer-events:none;opacity:0;transition:opacity .2s;}
  canvas{position:absolute;top:78px;left:50%;transform:translateX(-50%);z-index:4;cursor:pointer;}
  .legend{position:absolute;left:26px;bottom:104px;z-index:6;font-size:13px;color:#33566e;
    background:rgba(255,255,255,.75);padding:10px 12px;border-radius:14px;text-align:left;line-height:1.8;}
  .sw{display:inline-block;width:14px;height:14px;border-radius:3px;vertical-align:-2px;margin-right:6px;}
  .hint{position:absolute;left:0;right:0;bottom:92px;z-index:6;font-size:14px;color:#3a6a99;font-weight:700;}
  .controls{position:absolute;left:0;right:0;bottom:0;z-index:8;padding:20px;
    display:flex;flex-direction:row;justify-content:center;gap:16px;}
  button{font-family:inherit;font-weight:800;font-size:19px;color:#fff;border:none;
    padding:16px;border-radius:20px;cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,.12);transition:transform .08s;}
  button:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.12);}
  .btn-rain{background:#4A90D9;width:320px;}
  .btn-reset{background:#9aa7b2;width:190px;font-size:16px;}
</style>
</head>
<body>
  <div class="card">
    <div class="hud">
      <div class="badge" id="badge">안전</div>
      <div class="rain-amt" id="rainAmt">맑음</div>
    </div>
    <div class="speech" id="speech">기상이를 안전한 곳으로 옮겨요. 칸을 눌러보세요!</div>
    <canvas id="cv" width="880" height="520"></canvas>
    <div id="lottieSpark"></div>
    <div class="legend">
      <span class="sw" style="background:#8D6E4A"></span>높은 곳<br>
      <span class="sw" style="background:#A9C97E"></span>언덕<br>
      <span class="sw" style="background:#6FA96F"></span>마을<br>
      <span class="sw" style="background:#7Fb4e6"></span>낮은 곳<br>
      <span class="sw" style="background:#2f6fbf"></span>물에 잠김
    </div>
    <div class="hint" id="hint">👆 칸을 누르면 기상이가 그곳으로 이동해요</div>
    <div class="controls">
      <button class="btn-rain" id="btnRain">☔ 비가 더 와요</button>
      <button class="btn-reset" id="btnReset">다시 해보기</button>
    </div>
  </div>
<script src="https://cdn.jsdelivr.net/npm/lottie-web@5.12.2/build/player/lottie.min.js"></script>
<script>
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const $=id=>document.getElementById(id);
const N=6;
// 고도 격자 (가상 데이터). 실제 국토지리정보원 DEM으로 교체 예정.
const elev=[
 [5,4,4,3,3,2],
 [4,3,3,2,2,1],
 [4,3,2,2,1,1],
 [3,2,2,1,1,0],
 [3,2,1,1,0,0],
 [2,1,1,0,0,0],
];
const TW=92, TH=46, ESTEP=22;
const OX=cv.width/2, OY=250;
let targetWater=0, waterVisual=0, raining=false;
let hero={r:3,c:3}, hopFrom={r:3,c:3}, hopT=1;
let ripples=[], lastKey='';

const imgs={};
['rain','danger','happy'].forEach(k=>{const i=new Image();i.src='img/'+k+'.png';imgs[k]=i;});

// ---- 마을 오브젝트(생성형 AI 에셋) ----
const objImgs={};
['house','school','hospital','tree'].forEach(k=>{const i=new Image();i.src='img/assets/'+k+'.png';objImgs[k]=i;});
// 낮은 곳에 마을(집·학교·병원) → 물이 차면 먼저 잠김. 높은 가장자리엔 나무(풍경).
const village={'2,3':'hospital','3,2':'house','4,3':'house','3,4':'house','2,4':'school',
  '0,2':'tree','1,0':'tree','0,4':'tree','4,0':'tree'};

// ---- 비 (캔버스 파티클: 자연스러운 낙하) ----
const drops=[];
for(let i=0;i<110;i++)drops.push({x:Math.random()*cv.width,y:Math.random()*cv.height,
  len:9+Math.random()*14, spd:8+Math.random()*7, a:0.18+Math.random()*0.28});

// ---- Lottie 반짝이 (대피 성공) ----
let sparkleAnim=null; const sparkWrap=$('lottieSpark');
if(window.lottie){
  sparkleAnim=lottie.loadAnimation({container:sparkWrap,renderer:'svg',loop:false,autoplay:false,path:'lottie/sparkle.json'});
  sparkleAnim.addEventListener('complete',()=>{sparkWrap.style.opacity='0';});
}
function playSparkle(){if(sparkleAnim){sparkWrap.style.opacity='1';sparkleAnim.goToAndPlay(0,true);}}

function heightColor(e){
  if(e>=4)return'#8D6E4A'; if(e>=3)return'#A9C97E';
  if(e>=2)return'#6FA96F'; return'#7Fb4e6';
}
function iso(r,c,e){return {x:OX+(c-r)*TW/2, y:OY+(c+r)*TH/2 - e*ESTEP};}
function shade(hex,d){const n=parseInt(hex.slice(1),16);
  let r=(n>>16)+d,g=((n>>8)&255)+d,b=(n&255)+d;
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  return'rgb('+r+','+g+','+b+')';}
function diamond(x,y,fill,stroke){ctx.beginPath();
  ctx.moveTo(x,y-TH/2);ctx.lineTo(x+TW/2,y);ctx.lineTo(x,y+TH/2);ctx.lineTo(x-TW/2,y);
  ctx.closePath();ctx.fillStyle=fill;ctx.fill();
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1;ctx.stroke();}}
function sideWalls(x,y,e,base){const h=e*ESTEP;if(h<=0)return;
  ctx.fillStyle=shade(base,-30);
  ctx.beginPath();ctx.moveTo(x-TW/2,y);ctx.lineTo(x,y+TH/2);ctx.lineTo(x,y+TH/2+h);ctx.lineTo(x-TW/2,y+h);ctx.closePath();ctx.fill();
  ctx.fillStyle=shade(base,-52);
  ctx.beginPath();ctx.moveTo(x+TW/2,y);ctx.lineTo(x,y+TH/2);ctx.lineTo(x,y+TH/2+h);ctx.lineTo(x+TW/2,y+h);ctx.closePath();ctx.fill();}
function pointInTile(mx,my,r,c){const p=iso(r,c,elev[r][c]);
  return Math.abs(mx-p.x)/(TW/2)+Math.abs(my-p.y)/(TH/2)<=1;}
function isFlooded(r,c){return r>=0&&r<N&&c>=0&&c<N&&elev[r][c]<waterVisual-0.02;}

cv.addEventListener('click',ev=>{
  const rect=cv.getBoundingClientRect();
  const mx=(ev.clientX-rect.left)*(cv.width/rect.width);
  const my=(ev.clientY-rect.top)*(cv.height/rect.height);
  for(let s=2*(N-1);s>=0;s--)for(let r=0;r<N;r++){const c=s-r;if(c<0||c>=N)continue;
    if(pointInTile(mx,my,r,c)){moveHero(r,c);return;}}
});
function moveHero(r,c){if(r===hero.r&&c===hero.c)return;
  hopFrom={r:hero.r,c:hero.c}; hero={r,c}; hopT=0;}
function splash(r,c){const p=iso(r,c,waterVisual);
  for(let i=0;i<3;i++)ripples.push({x:p.x,y:p.y,t:-i*0.15});}

function waterColor(depth,extraA){
  const tt=Math.min(1,depth/3.5);
  const r=Math.round(150+(28-150)*tt), g=Math.round(200+(86-200)*tt), b=Math.round(235+(150-235)*tt);
  return 'rgba('+r+','+g+','+b+','+(0.30+0.20*tt+(extraA||0)).toFixed(2)+')';
}
// 수면 높이(출렁임): 위치별로 미세하게 다르게 → 평평한 판때기 느낌 제거
function surfH(r,c,t){return waterVisual + Math.sin((r+c)*0.85+t/280)*0.05 + Math.sin((r-c)*0.6 - t/360)*0.03;}

function draw(t){
  ctx.clearRect(0,0,cv.width,cv.height);
  // 지형 + 마을 오브젝트 + 물 (뒤→앞 한 번에: 깊이 정렬 자동)
  for(let s=0;s<=2*(N-1);s++)for(let r=0;r<N;r++){const c=s-r;if(c<0||c>=N)continue;
    const e=elev[r][c],p=iso(r,c,e);
    sideWalls(p.x,p.y,e,heightColor(e));
    diamond(p.x,p.y,heightColor(e),'rgba(255,255,255,.28)');
    const ob=village[r+','+c];
    if(ob&&objImgs[ob]&&objImgs[ob].complete){const im=objImgs[ob];
      const tw=TW*1.18, th2=tw*(im.naturalHeight/im.naturalWidth);
      ctx.drawImage(im,p.x-tw/2,p.y+TH*0.20-th2,tw,th2);}     // 타일 위에 세움
    if(isFlooded(r,c)){const wp=iso(r,c,surfH(r,c,t));         // 물이 건물 밑동을 덮음
      diamond(wp.x,wp.y,waterColor(waterVisual-e),null);}}
  // 물가 거품(shoreline): 물이 마른 땅과 만나는 가장자리에 흰 물결선
  ctx.lineCap='round';
  for(let s=0;s<=2*(N-1);s++)for(let r=0;r<N;r++){const c=s-r;if(c<0||c>=N)continue;
    if(!isFlooded(r,c))continue;
    const p=iso(r,c,surfH(r,c,t));
    const T=[p.x,p.y-TH/2],R=[p.x+TW/2,p.y],B=[p.x,p.y+TH/2],L=[p.x-TW/2,p.y];
    const foam=(v0,v1,ph)=>{const a=0.45+0.35*Math.sin(t/200+ph);
      ctx.strokeStyle='rgba(255,255,255,'+a.toFixed(2)+')';ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(v0[0],v0[1]);ctx.lineTo(v1[0],v1[1]);ctx.stroke();};
    if(!isFlooded(r,c+1))foam(R,B,p.x*0.05);       // 앞-오른쪽
    if(!isFlooded(r+1,c))foam(B,L,p.x*0.05+1.4);   // 앞-왼쪽
    if(!isFlooded(r-1,c))foam(T,R,p.y*0.05+0.7);   // 뒤-오른쪽
    if(!isFlooded(r,c-1))foam(L,T,p.y*0.05+2.1);   // 뒤-왼쪽
  }
  // 표면 반짝임
  for(let s=0;s<=2*(N-1);s++)for(let r=0;r<N;r++){const c=s-r;if(c<0||c>=N)continue;
    if(isFlooded(r,c)){const p=iso(r,c,surfH(r,c,t));
      const a=0.08+0.08*Math.sin(t/240+p.x*0.4+p.y*0.2);
      ctx.strokeStyle='rgba(255,255,255,'+a.toFixed(2)+')';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(p.x-TW*0.28,p.y-TH*0.14);ctx.lineTo(p.x,p.y-TH/2);ctx.stroke();}}
  // 파문
  ripples.forEach(rp=>{if(rp.t<0)return;ctx.strokeStyle='rgba(255,255,255,'+(1-rp.t)*0.7+')';ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(rp.x,rp.y,rp.t*34,rp.t*17,0,0,7);ctx.stroke();});
  // 기상이 (원본 1:1 비율 유지)
  const hp=iso(hero.r,hero.c,Math.max(elev[hero.r][hero.c],waterVisual));
  let hx=hp.x,hy=hp.y;
  if(hopT<1){const fp=iso(hopFrom.r,hopFrom.c,Math.max(elev[hopFrom.r][hopFrom.c],waterVisual));
    hx=fp.x+(hp.x-fp.x)*hopT; hy=fp.y+(hp.y-fp.y)*hopT - Math.sin(hopT*Math.PI)*44;}
  const bob=Math.sin(t/300)*5;
  const flooded=elev[hero.r][hero.c]<waterVisual-0.02;
  const heroE=elev[hero.r][hero.c];
  const img=flooded?imgs.danger:(heroE>=4?imgs.happy:imgs.rain);
  if(img&&img.complete){
    const th=124, ratio=(img.naturalWidth&&img.naturalHeight)?img.naturalWidth/img.naturalHeight:1;
    ctx.drawImage(img, hx-(th*ratio)/2, hy-th+14+(hopT<1?0:bob), th*ratio, th);
  }
  // 비 (지형 위에 그림)
  if(raining){ctx.strokeStyle='rgba(150,190,225,.55)';
    drops.forEach(d=>{ctx.globalAlpha=d.a;ctx.lineWidth=1.6;
      ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d.x-3,d.y+d.len);ctx.stroke();});
    ctx.globalAlpha=1;}
}
function loop(t){
  if(waterVisual<targetWater)waterVisual=Math.min(targetWater,waterVisual+0.012);
  ripples.forEach(r=>r.t+=0.03); ripples=ripples.filter(r=>r.t<1);
  if(raining)drops.forEach(d=>{d.y+=d.spd;d.x-=1.1;if(d.y>cv.height){d.y=-d.len;d.x=Math.random()*cv.width;}});
  if(hopT<1){hopT=Math.min(1,hopT+0.06);
    if(hopT>=1){const fl=elev[hero.r][hero.c]<waterVisual-0.02;
      if(fl)splash(hero.r,hero.c);
      else if(elev[hero.r][hero.c]>=4&&waterVisual>=1.5)playSparkle();}}
  updateStatus();
  draw(t);
  requestAnimationFrame(loop);
}
function updateStatus(){
  const heroE=elev[hero.r][hero.c];
  const flooded=heroE<waterVisual-0.02;
  let b,col,msg;
  if(flooded){b='위험';col='#E53935';msg='물에 잠겼어요! 더 높은 곳으로 옮겨요!';}
  else if(waterVisual>=heroE-0.55&&waterVisual>0){b='경고';col='#FB8C00';msg='물이 코앞이에요. 조심!';}
  else if(heroE>=4){b='안전';col='#43A047';msg='높은 곳이라 안전해요!';}
  else{b='안전';col='#43A047';msg=waterVisual>0?'아직은 괜찮아요. 더 높은 곳은?':'기상이를 안전한 곳으로 옮겨요. 칸을 눌러보세요!';}
  const key=b+msg;
  if(key!==lastKey){lastKey=key;$('badge').textContent=b;$('badge').style.background=col;$('speech').textContent=msg;}
}
$('btnRain').onclick=()=>{raining=true;targetWater=Math.min(5,targetWater+1);
  $('rainAmt').textContent='시간당 빗물 '+Math.round(targetWater*18)+'mm';};
$('btnReset').onclick=()=>{targetWater=0;waterVisual=0;raining=false;ripples=[];
  hero={r:3,c:3};hopFrom={r:3,c:3};hopT=1;$('rainAmt').textContent='맑음';lastKey='';sparkWrap.style.opacity='0';};

let ready=setInterval(()=>{if(imgs.rain.complete){clearInterval(ready);requestAnimationFrame(loop);}},60);
</script>
</body>
</html>
