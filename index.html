<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>골든타임 프로토타입 — 물 차오름 + 기상이 반응</title>
<style>
  :root{
    --sky:#bfe6fb; --sky2:#e8f7ff; --cream:#FDEEE0;
    --safe:#43A047; --warn:#FB8C00; --danger:#E53935;
    --water:#4A90D9;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:linear-gradient(#dff2ff,#f5fbff);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .card{
    position:relative; width:420px; height:640px; border-radius:32px;
    background:linear-gradient(var(--sky2),var(--sky));
    box-shadow:0 20px 60px rgba(60,120,180,.28);
    overflow:hidden; text-align:center;
  }
  .hud{
    position:absolute; top:0; left:0; right:0; z-index:6;
    padding:16px 18px; display:flex; align-items:center; gap:10px;
  }
  .badge{
    font-weight:800; font-size:15px; color:#fff; padding:7px 14px;
    border-radius:999px; background:var(--safe); transition:background .3s;
    display:flex; align-items:center; gap:6px;
  }
  .rain-amt{margin-left:auto; font-weight:800; color:#2b6fb0; font-size:14px;}
  /* 캐릭터 */
  .stage{position:absolute; inset:0; z-index:4;}
  .gisang{
    position:absolute; left:50%; top:210px; width:180px; transform:translateX(-50%);
    z-index:5; transition:top .4s ease;
    animation:bob 2.2s ease-in-out infinite;
    filter:drop-shadow(0 8px 10px rgba(40,90,140,.22));
  }
  @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-10px)}}
  .pop{animation:pop .45s cubic-bezier(.3,1.6,.5,1);}
  @keyframes pop{0%{transform:translateX(-50%) scale(.7)}60%{transform:translateX(-50%) scale(1.12)}100%{transform:translateX(-50%) scale(1)}}
  /* 물 */
  .water{
    position:absolute; left:0; right:0; bottom:0; height:0;
    background:linear-gradient(rgba(74,144,217,.78),rgba(40,110,190,.92));
    z-index:5; transition:height 3.4s linear;
    border-top:3px solid rgba(255,255,255,.55);
  }
  .water::before,.water::after{
    content:""; position:absolute; top:-14px; left:0; width:200%; height:16px;
    background:radial-gradient(circle at 12px -4px, rgba(74,144,217,.85) 10px, transparent 11px) repeat-x;
    background-size:24px 16px; animation:wave 1.4s linear infinite;
  }
  .water::after{opacity:.5; animation-duration:2.1s;}
  @keyframes wave{to{transform:translateX(-24px)}}
  /* 비 */
  .rain{position:absolute; inset:0; z-index:3; pointer-events:none; opacity:0; transition:opacity .5s;}
  .drop{position:absolute; top:-20px; width:2px; height:16px; background:rgba(255,255,255,.7); border-radius:2px; animation:fall linear infinite;}
  @keyframes fall{to{transform:translateY(680px)}}
  /* 하단 버튼 */
  .controls{position:absolute; left:0; right:0; bottom:0; z-index:8; padding:18px; display:flex; flex-direction:column; gap:12px;}
  button{
    font-family:inherit; font-weight:800; font-size:18px; color:#fff; border:none;
    padding:16px; border-radius:20px; cursor:pointer; box-shadow:0 6px 0 rgba(0,0,0,.12);
    transition:transform .08s;
  }
  button:active{transform:translateY(3px); box-shadow:0 3px 0 rgba(0,0,0,.12);}
  .btn-rain{background:#4A90D9;}
  .btn-evac{background:var(--safe); display:none;}
  .btn-reset{background:#9aa7b2; font-size:14px; padding:10px;}
  .speech{
    position:absolute; left:50%; top:150px; transform:translateX(-50%);
    z-index:7; background:#fff; color:#2b4a63; font-weight:700; font-size:15px;
    padding:9px 16px; border-radius:16px; box-shadow:0 6px 16px rgba(40,90,140,.2);
    white-space:nowrap; transition:opacity .3s;
  }
  .spark{position:absolute; font-size:26px; z-index:9; pointer-events:none; animation:spark 1s ease-out forwards;}
  @keyframes spark{0%{transform:translateY(0) scale(.4); opacity:1}100%{transform:translateY(-90px) scale(1.2); opacity:0}}
  @media (prefers-reduced-motion:reduce){.gisang{animation:none} .water{transition-duration:1s}}
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="hud">
      <div class="badge" id="badge">안전</div>
      <div class="rain-amt" id="rainAmt">맑음</div>
    </div>
    <div class="rain" id="rain"></div>
    <div class="speech" id="speech">비가 오기 시작했어요!</div>
    <img class="gisang" id="gisang" src="img/rain.png" alt="기상이">
    <div class="water" id="water"></div>
    <div class="controls">
      <button class="btn-rain" id="btnRain">☔ 비가 많이 와요</button>
      <button class="btn-evac" id="btnEvac">⛰️ 높은 곳으로 대피!</button>
      <button class="btn-reset" id="btnReset">다시 해보기</button>
    </div>
  </div>
<script>
  const $=id=>document.getElementById(id);
  const gisang=$('gisang'), water=$('water'), badge=$('badge'),
        speech=$('speech'), rain=$('rain'), rainAmt=$('rainAmt'),
        btnRain=$('btnRain'), btnEvac=$('btnEvac');
  let dangerTimer=null;

  // 빗방울 생성
  for(let i=0;i<40;i++){
    const d=document.createElement('div'); d.className='drop';
    d.style.left=Math.random()*100+'%';
    d.style.animationDuration=(0.5+Math.random()*0.5)+'s';
    d.style.animationDelay=(Math.random()*1)+'s';
    rain.appendChild(d);
  }
  function swap(src){gisang.src='img/'+src; gisang.classList.remove('pop'); void gisang.offsetWidth; gisang.classList.add('pop');}
  function say(t){speech.textContent=t;}
  function setBadge(text,color){badge.textContent=text; badge.style.background=color;}

  btnRain.onclick=()=>{
    rain.style.opacity='1';
    rainAmt.textContent='시간당 빗물 42mm';
    water.style.height='300px';            // 물 차오름 (개념: 위험의 시각화)
    swap('surprise.png'); say('물이 점점 차올라요!');
    setBadge('경고','#FB8C00');
    btnRain.style.display='none';
    // 위험 수위 도달 → 캐릭터 식은땀 + 대피 버튼
    dangerTimer=setTimeout(()=>{
      swap('danger.png'); say('위험해요! 어떻게 하죠?');
      setBadge('위험','#E53935');
      btnEvac.style.display='block';
    },2400);
  };

  btnEvac.onclick=()=>{
    clearTimeout(dangerTimer);
    gisang.style.top='150px';              // 기상이 고지대로 이동
    water.style.transitionDuration='1s';
    water.style.height='120px';            // 물이 발밑에 못 닿음
    swap('happy.png'); say('안전한 곳으로 대피 성공!');
    setBadge('안전','#43A047');
    btnEvac.style.display='none';
    for(let i=0;i<12;i++){
      const s=document.createElement('div'); s.className='spark'; s.textContent='✨';
      s.style.left=(30+Math.random()*40)+'%'; s.style.top='200px';
      s.style.animationDelay=(Math.random()*.4)+'s';
      $('card').appendChild(s); setTimeout(()=>s.remove(),1400);
    }
  };

  $('btnReset').onclick=()=>{
    clearTimeout(dangerTimer);
    water.style.transitionDuration='3.4s'; water.style.height='0';
    gisang.style.top='210px'; swap('rain.png'); say('비가 오기 시작했어요!');
    setBadge('안전','#43A047'); rain.style.opacity='0'; rainAmt.textContent='맑음';
    btnRain.style.display='block'; btnEvac.style.display='none';
  };
</script>
</body>
</html>
